{% extends 'base.html' %}
{% block title %} Dashboard {% endblock %}
{% block content %}
<div>
    <br>
    <p>This is the dashboard page</p>

    <div>
        <canvas id="line-chart" width="800" height="450"></canvas>
    </div>

    <div>
        <canvas id="bar-chart-grouped" width="800" height="450"></canvas>
    </div>

</div>

<script>
    new Chart(document.getElementById("line-chart"), {
        type: 'line',
        data: {
            labels: {{ dates | safe }},
            datasets: [{
                data: {{ day_profit | safe }},
                label: "Sales per ",
                borderColor: "#3e95cd",
                fill: false
            }, {
                data: {{ day_sales | safe }},
                label: "Asia",
                borderColor: "#8e5ea2",
                fill: false
            }, 
            ]
        },
        options: {
            title: {
                display: true,
                text: 'World population per region (in millions)'
            }
        }
    });

    new Chart(document.getElementById("bar-chart-grouped"), {
        type: 'bar',
        data: {
            labels: {{ product_names | safe }},
            datasets: [
                {
                    label: "Africa",
                    backgroundColor: "#3e95cd",
                    data: {{ prod_sales | safe }}
                }, {
                    label: "Europe",
                    backgroundColor: "#8e5ea2",
                    data: {{ prod_profit | safe }}
                }
            ]
        },
        options: {
            title: {
                display: true,
                text: 'Sales and Profit per Products(Ksh.)'
            }
        }
    });
</script>

{% endblock %}
